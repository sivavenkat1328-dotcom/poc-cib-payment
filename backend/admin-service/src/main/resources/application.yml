server:
  port: 8090

spring:

  application:
    name: ADMIN-SERVICE

  datasource:
    url: jdbc:h2:file:./data/admindb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console


eureka:

  client:

    register-with-eureka: true

    fetch-registry: true

    service-url:

      defaultZone: http://localhost:8761/eureka

  instance:

    prefer-ip-address: true


management:

  endpoints:

    web:

      exposure:

        include: "*"

  endpoint:

    health:

      show-details: always


logging:

  level:

    org.springframework.web: INFO

    com.cib.admin: DEBUG