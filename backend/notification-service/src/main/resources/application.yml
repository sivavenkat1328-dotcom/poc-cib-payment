server:
  port: 8091

spring:

  application:

    name: NOTIFICATION-SERVICE

  datasource:

    url: jdbc:h2:file:./data/notificationdb

    driver-class-name: org.h2.Driver

    username: sa

    password:

  jpa:

    hibernate:

      ddl-auto: update

    show-sql: true

  h2:

    console:

      enabled: true


eureka:

  client:

    register-with-eureka: true

    fetch-registry: true

    service-url:

      defaultZone: http://localhost:8761/eureka


  instance:

    prefer-ip-address: true