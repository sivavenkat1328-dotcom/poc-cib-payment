server:
  port: 8093

spring:

  application:
    name: report-service

eureka:

  client:

    register-with-eureka: true

    fetch-registry: true

    service-url:

      defaultZone: http://localhost:8761/eureka

  instance:

    prefer-ip-address: true

management:

  endpoints:

    web:

      exposure:

        include: health,info

springdoc:

  swagger-ui:

    path: /swagger-ui.html