<section class="login-shell">
  <div class="login-card">
    <div class="login-card__hero">
      <p class="eyebrow">Secure banking access</p>
      <h1>Realtime banking portal</h1>
      <p>Authenticate safely and enter the AI-powered payment command center.</p>
    </div>

    <form class="login-form">
      <label>
        <span>Email</span>
        <input type="email" placeholder="agent@cibbank.com" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" placeholder="••••••••" />
      </label>
      <button type="submit" class="primary-btn">Sign in</button>
      <a class="text-link" routerLink="/dashboard">Continue to dashboard</a>
    </form>
  </div>
</section>
