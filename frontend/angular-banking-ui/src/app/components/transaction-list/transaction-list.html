<section class="txn-list">
  <div class="txn-list__header">
    <h3>{{ title }}</h3>
    <button type="button">View all</button>
  </div>
  <div class="txn-list__body">
    @for (item of items; track item.label) {
      <article class="txn-item">
        <div>
          <p class="txn-item__label">{{ item.label }}</p>
          <span class="txn-item__detail">{{ item.detail }}</span>
        </div>
        <strong class="txn-item__amount" [class]="item.type">{{ item.amount }}</strong>
      </article>
    }
  </div>
</section>
