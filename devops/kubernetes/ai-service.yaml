apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-service
  namespace: cib-bank

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-service

  template:
    metadata:
      labels:
        app: ai-service

    spec:
      containers:
      - name: ai-service
        image: cib/ai-service:latest

        ports:
        - containerPort: 8089

---
apiVersion: v1
kind: Service

metadata:
  name: ai-service
  namespace: cib-bank

spec:
  selector:
    app: ai-service

  ports:
  - port: 8089
    targetPort: 8089

  type: ClusterIP